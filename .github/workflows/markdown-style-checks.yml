name: Markdown style checks

on:
  workflow_call:
  push:
    branches:
    - main
    paths:
    - 'docs-rtd/**'   # Only run on changes to the docs directory
  pull_request:
    branches:
    - '*'
    paths:
    - 'docs-rtd/**'   # Only run on changes to the docs directory

jobs:
  markdown-lint:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v5
      with:
        fetch-depth: 0
    - name: Create venv
      working-directory: "docs-rtd"
      run: make install
    - name: Lint markdown
      working-directory: "docs-rtd"
      run: make lint-md
